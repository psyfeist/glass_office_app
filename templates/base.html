<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Glass Office{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f6f8;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        h1 {
            margin-bottom: 10px;
        }
        .nav {
            margin-bottom: 20px;
        }
        .nav a {
            margin-right: 15px;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Glass Office System</h1>

    <div class="nav">
        <a href="/">Home</a>
        <a href="/jobs">Jobs</a>
        <a href="/jobs/new">Create Job</a>
    </div>

    <hr>

    {% block content %}{% endblock %}

</body>
</html>
