{% extends "base.html" %}

{% block title %}Create Job{% endblock %}

{% block content %}

<h2>Create New Job</h2>

<form method="POST">

    <!-- Hidden location fields -->
    <input type="hidden" name="latitude" id="latitude">
    <input type="hidden" name="longitude" id="longitude">

    <!-- 🔥 LOCATION CARD -->
    <div class="card">
        <h3>Location</h3>

        <button type="button" onclick="openMap()">📍 Set Location</button>

        <p id="location-status">⚠️ No location set</p>
    </div>

    <!-- MAIN FORM CARD -->
    <div class="card">

        <p>
            <label>Customer Name:</label><br>
            <input type="text" name="customer_name" required>
        </p>

        <p>
            <label>Address</label><br>
            <input type="text" name="address">
        </p>

        <p>
            <label>Location Instructions</label><br>
            <textarea name="location_instructions" rows="3"></textarea><br>
            <small>Provide an address OR location instructions (required)</small>
        </p>

        <p>
            <label>Contact Info:</label><br>
            <input type="text" name="contact_info">
        </p>

        <p>
            <label>Job Type:</label><br>
            <select name="job_type" required>
                <option value="residential">Residential</option>
                <option value="commercial">Commercial</option>
            </select>
        </p>

        <p>
            <label>Job Category:</label><br>
            <input type="text" name="job_category">
        </p>

        <p>
            <label>Install Date:</label><br>
            <input type="date" name="install_date">
        </p>

        <label>Assign Installers</label>

        <select name="installers" multiple>
            {% for installer in installers %}
                <option value="{{ installer.id }}">
                    {{ installer.name }}
                </option>
            {% endfor %}
        </select>

        <p>
            <label>Status:</label><br>
            <select name="status" required>
                <option value="needs_measurement">Needs Measurement</option>
                <option value="to_be_scheduled">To Be Scheduled</option>
                <option value="scheduled">Scheduled</option>
                <option value="on_site">On Site</option>
                <option value="in_progress">In Progress</option>
                <option value="completed">Completed</option>
                <option value="needs_return_visit">Needs Return Visit</option>
            </select>
        </p>

        <p>
            <label>Scope of Work:</label><br>
            <textarea name="scope_of_work" rows="4"></textarea>
        </p>

        <button type="submit">Create Job</button>

    </div>
</form>

<!-- 🔥 MAP MODAL -->
<div id="mapModal" style="
    display:none;
    position:fixed;
    top:10%;
    left:5%;
    width:90%;
    background:white;
    padding:10px;
    border:1px solid #ccc;
    z-index:1000;
">
    
    <div id="map" style="height:700px;"></div>

    <br>
    <button type="button" onclick="closeMap()">Close</button>
</div>

<!-- 🔥 LEAFLET -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- 🔥 MAP SCRIPT (FIXED PROPERLY) -->
<script>
let map;
let marker;

function openMap() {
    console.log("openMap triggered");

    // Show modal first
    document.getElementById("mapModal").style.display = "block";

    // Wait for modal to render
    setTimeout(() => {

        // Initialize map ONCE
        if (!map) {
            map = L.map('map').setView([52, -106], 6);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);

            map.on('click', function(e) {
                const { lat, lng } = e.latlng;

                if (marker) {
                    map.removeLayer(marker);
                }

                marker = L.marker([lat, lng]).addTo(map);

                // Save values to hidden inputs
                document.getElementById("latitude").value = lat;
                document.getElementById("longitude").value = lng;

                // Update UI
                const status = document.getElementById("location-status");
                if (status) {
                    status.innerText = "✅ Location set";
                }
            });
        }

        // 🔥 Critical fix for hidden map rendering
        map.invalidateSize();

    }, 100);
}

function closeMap() {
    document.getElementById("mapModal").style.display = "none";
}
</script>

{% endblock %}
