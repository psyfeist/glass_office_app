{% extends "base.html" %}

{% block content %}

<h2>Edit User</h2>

<form method="POST">

    <label>Name</label><br>
    <input type="text" name="name" value="{{ user.name }}" required><br><br>

    <label>Email</label><br>
    <input type="email" name="email" value="{{ user.email }}" required><br><br>

    <label>Role</label><br>
    <select name="role">
        <option value="admin" {% if user.role == "admin" %}selected{% endif %}>Office/Admin</option>
        <option value="installer" {% if user.role == "installer" %}selected{% endif %}>Installer</option>
    </select><br><br>

    <button type="submit">Save Changes</button>

</form>

<br>
<a href="{{ url_for('manage_users') }}">← Back to Users</a>

{% endblock %}
