{% extends "base.html" %}

{% block title %}All Jobs{% endblock %}

{% block content %}

<h2>Job List</h2>

{% for job in jobs %}
    <div class="card">
        <h3>
    <a href="/jobs/{{ job.id }}">
        {{ job.customer_name }}
    </a>
</h3>
        <p><strong>Address:</strong> {{ job.address }}</p>
        <p><strong>Status:</strong> {{ job.status.replace('_', ' ').title() }}</p>
    </div>
{% endfor %}

{% endblock %}
