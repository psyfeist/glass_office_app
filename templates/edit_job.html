{% extends "base.html" %}

{% block content %}

<h2>Edit Job</h2>

<form method="POST">

    <label>Customer Name</label><br>
    <input type="text" name="customer_name" value="{{ job.customer_name }}" required><br><br>

    <label>Address</label><br>
    <input type="text" name="address" value="{{ job.address }}" required><br><br>

    <label>Contact Info</label><br>
    <input type="text" name="contact_info" value="{{ job.contact_info }}"><br><br>

    <label>Job Type</label><br>
    <input type="text" name="job_type" value="{{ job.job_type }}"><br><br>

    <label>Category</label><br>
    <input type="text" name="job_category" value="{{ job.job_category }}"><br><br>

    <label>Scope of Work</label><br>
    <textarea name="scope_of_work" rows="5">{{ job.scope_of_work }}</textarea><br><br>

    <button type="submit">Save Changes</button>

</form>

<hr>

<form action="{{ url_for('delete_job', job_id=job.id) }}" method="POST">
    <button type="submit" onclick="return confirm('Are you sure you want to delete this job? This cannot be undone.')">
        Delete Job
    </button>
</form>

<br>
<a href="{{ url_for('job_detail', job_id=job.id) }}">← Back to Job</a>

{% endblock %}
