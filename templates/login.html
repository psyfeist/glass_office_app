{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}

<h2>Login</h2>

<form method="POST">

<p>
<label>Email</label><br>
<input type="email" name="email" required>
</p>

<p>
<label>Password</label><br>
<input type="password" name="password" required>
</p>

<button type="submit">Login</button>

</form>

{% endblock %}
